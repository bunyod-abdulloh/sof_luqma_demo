{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2E8B3D">

    <title>{% block title %}Sof Luqma — Tabiiy Toza{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/modal-styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/cart.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body class="pb-28">

<main>
    {% block content %}{% endblock %}
</main>

{% include 'pages/cart.html' %}
{% include 'includes/navigation.html' %}

<script type="module" src="{% static 'js/main.js' %}?v={{ APP_VERSION }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
